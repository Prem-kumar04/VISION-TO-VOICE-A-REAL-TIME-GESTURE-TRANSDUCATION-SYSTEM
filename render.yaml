services:
  - type: web
    name: vision-to-voice
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: "true"
