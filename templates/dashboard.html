
<!DOCTYPE html>
<html>
<head>
    <title>AI Sign Language</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .suggestion-ghost { color: #b2bec3; }
        #enterHint { font-size: 0.8rem; color: #0984e3; display: none; margin-top: 5px; }
        .big-live-letter {
            font-size: 5rem; font-weight: 900; color: #e84393;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            min-height: 100px; display: block;
        }
        .speak-btn {
            background: none; border: none; font-size: 1.5rem; cursor: pointer;
            transition: transform 0.2s; float: right;
        }
        .speak-btn:hover { transform: scale(1.2); }
        
        /* Browser camera styles */
        #browserVideo {
            display: none; /* Hidden - we only capture from it */
        }
        #cameraCanvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .camera-status {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            z-index: 10;
            letter-spacing: 0.5px;
        }
        .camera-status.connecting {
            background: rgba(255, 165, 0, 0.9);
            color: #fff;
        }
        .camera-status.live {
            background: rgba(0, 200, 83, 0.9);
            color: #fff;
            animation: pulse-live 2s infinite;
        }
        .camera-status.error {
            background: rgba(255, 59, 48, 0.9);
            color: #fff;
        }
        @keyframes pulse-live {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .camera-permission-prompt {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #ccc;
            z-index: 5;
        }
        .camera-permission-prompt h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        .camera-permission-prompt p {
            font-size: 0.9rem;
            color: #999;
        }
        .camera-permission-prompt .cam-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            display: block;
        }
    </style>
</head>
<body id="dashboard-page">

    <div class="navbar-custom d-flex justify-content-between">
        <h4 class="text-white m-0">SignTranslator AI</h4>
        <div>
            <select class="form-select d-inline w-auto me-2" onchange="setLanguage(this.value)">
                <option value="te">Telugu</option>
                <option value="hi">Hindi</option>
                <option value="ta">Tamil</option>
                <option value="en">English</option>
            </select>
            <a href="/profile" class="btn btn-outline-light btn-sm">Profile</a>
            <a href="/logout" class="btn btn-danger btn-sm ms-2">Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="camera-container">
            <!-- Status badge -->
            <span id="cameraStatus" class="camera-status connecting">⏳ Connecting Camera...</span>
            
            <!-- Permission prompt (shown before camera starts) -->
            <div id="cameraPrompt" class="camera-permission-prompt">
                <span class="cam-icon">📷</span>
                <h3>Starting Camera...</h3>
                <p>Please allow camera access when prompted by your browser.</p>
            </div>
            
            <!-- Hidden video element for browser webcam -->
            <video id="browserVideo" autoplay playsinline muted></video>
            
            <!-- Canvas to display annotated frames from server -->
            <canvas id="cameraCanvas" class="camera-feed"></canvas>
        </div>

        <div class="text-panel">
            <div class="live-word-box">
                <h6 class="text-muted text-uppercase">You are signing:</h6>
                <span id="livePreview" class="big-live-letter">_</span>
                <hr>
                <h6 class="text-muted">Word Building:</h6>
                <div>
                    <span id="liveWord" class="live-word-text"></span>
                    <span id="suggestionText" class="live-word-text suggestion-ghost"></span>
                </div>
                <div class="mt-2">
                    <span id="confScore" class="badge bg-warning text-dark">0%</span>
                </div>
                <div id="enterHint">[Press ENTER to Autofill]</div>
            </div>
            
            <div class="transcript-box">
                <p id="engOut" class="eng-sent"></p>
                <hr>
                <div class="d-flex justify-content-between align-items-center">
                    <p id="nativeOut" class="native-sent m-0"></p>
                    <button type="button" class="speak-btn" onclick="playFullSentence()" title="Read Aloud">🔊</button>
                </div>
            </div>
            
            <div class="row g-2">
                <div class="col-6">
                    <button id="saveBtn" class="btn btn-success w-100" onclick="saveSession()">Save Session</button>
                </div>
                <div class="col-6">
                    <a href="/download_transcript" class="btn btn-outline-primary w-100" target="_blank">Download</a>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
